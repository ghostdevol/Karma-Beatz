<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Karma-Beatz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 80px;
    }
    h1 {
      letter-spacing: 2px;
    }
    .player-info {
      margin-top: 20px;
      font-size: 0.9rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <h1>Karma-Beatz</h1>

  <!-- Auto-playing M4A audio -->
  <audio id="karmaPlayer" src="karma-beatz.m4a" autoplay loop controls>
    Your browser does not support the audio element.
  </audio>

  <div class="player-info">
    Now playing: Karma-Beatz
  </div>

  <script>
    // Some browsers block autoplay with sound; this tries to start playback after load.
    window.addEventListener('load', function () {
      const audio = document.getElementById('karmaPlayer');
      const playPromise = audio.play();
      if (playPromise !== undefined) {
        playPromise.catch(() => {
          // Autoplay blocked; you could show a message or rely on user pressing play.
          console.log('Autoplay was blocked by the browser.');
        });
      }
    });
  </script>
</body>
</html>
